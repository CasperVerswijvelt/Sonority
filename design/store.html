<title>Sonority — Play Store graphics</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{margin:0;background:#000;font-family:'Futura','Avenir Next','Century Gothic',ui-rounded,system-ui,sans-serif}
  #stage{position:relative;overflow:hidden;background:#0A0A0B}
  .bg{position:absolute;inset:0;background:
      radial-gradient(120% 90% at 50% 0%, #18181d 0%, #0A0A0B 60%)}
  .word{font-weight:500;letter-spacing:.01em;color:#fff}
  .grey{color:#9a9aa0}
  /* minimal phone frame */
  .phone{position:relative;border:14px solid #232329;border-radius:54px;background:#000;
    box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
  .phone img{display:block;width:100%;height:100%;object-fit:cover}
</style>
<div id="stage"></div>
<script>
const INK='#FFFFFF', BG='#0A0A0B', GREY='#98989F';
const circle=(cx,cy,r,f)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${f}"/>`;
const rrect=(x,y,w,h,r,f)=>`<rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="${r}" fill="${f}"/>`;
// The Sonority mark (9c-3): three speaker cabinets (tweeter + woofer), white front
// speaker flanked by two grey ones with tops peeking higher. Kept in sync with
// design/export.html / design/logo.html (bbox cx 500, cy 445).
function spk(cx,cy,h,fill){
  const w=h*0.74, r=h*0.16;
  return rrect(cx,cy,w,h,r,fill)
    + circle(cx, cy-h*0.235, h*0.085, BG)
    + circle(cx, cy+h*0.16,  h*0.185, BG);
}
function diagramSvg(scale=1.15){
  const m = spk(325,400,300,GREY)+spk(675,400,300,GREY)+spk(500,460,360,INK);
  return `<svg viewBox="0 0 1000 1000" style="width:100%;height:100%">
    <g transform="translate(500 500) scale(${scale}) translate(-500 -445)">${m}</g></svg>`;
}

// Marketing copy per screenshot. Sources are captured app screens (1290x2796,
// tool/capture_shots.dart) in shots/; the CANVAS is what hits each store's
// required size, so the inner shot can be any size. See docs/MARKETING-ASSETS.md.
const SHOTS = [
  { src:'shots/01-overview.png', head:'Your whole<br>Sonos system',
    sub:'Home theaters, speaker groups and every room — at a glance.' },
  { src:'shots/02-home-theater.png', head:'Dedicated<br>front speakers',
    sub:'Add discrete front L / R to your soundbar — a home theater the Sonos app won’t build.' },
  { src:'shots/03-group.png', head:'Stereo pairs,<br>zones &amp; more',
    sub:'Bond any speakers into one room — even mismatched models the app blocks.' },
  { src:'shots/04-profiles.png', head:'Save &amp; restore<br>your layouts',
    sub:'Snapshot your setup and rebuild fronts, surrounds and groups in one tap.' },
];

const params = new URLSearchParams(location.search);
const mode = params.get('mode') || 'feature';
const stage = document.getElementById('stage');
function size(w,h){ stage.style.width=w+'px'; stage.style.height=h+'px'; }
const idx = () => parseInt(params.get('i')||'0',10);

function featureGraphic(){
  size(1024,500);
  stage.innerHTML = `
    <div class="bg"></div>
    <div style="position:absolute;left:80px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;width:560px">
      <div class="word" style="font-size:104px;line-height:1">Sonority</div>
      <div class="grey" style="font-size:31px;margin-top:22px;line-height:1.35;max-width:520px">
        Home-theater layouts, speaker groups and one-tap profiles for Sonos —
        the setups the official app won’t let you create.</div>
    </div>
    <div style="position:absolute;right:70px;top:50%;transform:translateY(-50%);width:300px;height:300px">
      ${diagramSvg(1)}
    </div>`;
}

// Portrait framed marketing shot (caption on top, phone below). Height-driven so
// the same layout fills any portrait canvas: Play phone (1080x1920) & iPhone
// 6.9" (1290x2796).
function framedPortrait(w,h,i){
  size(w,h);
  const sh = SHOTS[i];
  const phoneH = h*0.68;
  // Match the source-shot aspect (1290x2796, tool/capture_shots.dart) so the
  // frame doesn't object-fit:cover-crop the top/bottom of the screen.
  const phoneW = phoneH*(1290/2796);
  stage.innerHTML = `
    <div class="bg"></div>
    <div style="position:absolute;left:0;right:0;top:${h*0.055}px;text-align:center;padding:0 ${w*0.08}px">
      <div class="word" style="font-size:${w*0.078}px;line-height:1.08">${sh.head}</div>
      <div class="grey" style="font-size:${w*0.032}px;line-height:1.4;margin-top:${h*0.015}px">${sh.sub}</div>
    </div>
    <div class="phone" style="position:absolute;left:50%;transform:translateX(-50%);
        bottom:${h*0.045}px;width:${phoneW}px;height:${phoneH}px;border-width:${w*0.013}px;border-radius:${w*0.05}px">
      <img src="${sh.src}">
    </div>`;
}

// macOS marketing shot: caption on the left, the portrait app window on the
// right (the mac app is a fixed portrait window), on the branded background.
function macCard(i){
  const w=2560,h=1600; size(w,h);
  const sh = SHOTS[i];
  const phoneH = h*0.82;
  const phoneW = phoneH*(1080/2400);
  stage.innerHTML = `
    <div class="bg"></div>
    <div style="position:absolute;left:${w*0.08}px;top:50%;transform:translateY(-50%);width:${w*0.44}px">
      <div class="word" style="font-size:${w*0.058}px;line-height:1.05">${sh.head}</div>
      <div class="grey" style="font-size:${w*0.024}px;margin-top:${h*0.03}px;line-height:1.4">${sh.sub}</div>
    </div>
    <div class="phone" style="position:absolute;right:${w*0.08}px;top:50%;transform:translateY(-50%);
        width:${phoneW}px;height:${phoneH}px;border-width:${w*0.006}px;border-radius:${w*0.02}px">
      <img src="${sh.src}">
    </div>`;
}

function tablet(w,h){
  size(w,h);
  const k = w/1920;  // scale factor relative to the 7" baseline
  const px = v => (v*k)+'px';
  stage.innerHTML = `
    <div class="bg"></div>
    <div style="position:absolute;left:${px(110)};top:50%;transform:translateY(-50%);width:${px(720)}px">
      <div class="word" style="font-size:${px(96)};line-height:1.05">Sonority</div>
      <div class="grey" style="font-size:${px(36)};margin-top:${px(26)};line-height:1.4;max-width:${px(640)}">
        Home-theater layouts, speaker groups and one-tap profiles for Sonos —
        configurations the official app blocks.</div>
    </div>
    <div style="position:absolute;right:${px(140)};top:50%;transform:translateY(-50%);
        display:flex;gap:${px(60)};align-items:center">
      <div class="phone" style="width:${px(360)};height:${px(800)};border-width:${px(12)};border-radius:${px(44)}">
        <img src="${SHOTS[0].src}"></div>
      <div class="phone" style="width:${px(360)};height:${px(800)};border-width:${px(12)};border-radius:${px(44)};margin-top:${px(120)}">
        <img src="${SHOTS[1].src}"></div>
    </div>`;
}

if (mode==='feature') featureGraphic();
else if (mode==='tablet7') tablet(1920,1080);
else if (mode==='tablet10') tablet(2560,1440);
else if (mode==='ios69') framedPortrait(1290,2796, idx());
else if (mode==='mac') macCard(idx());
else phoneCard(idx());
function phoneCard(i){ framedPortrait(1080,1920,i); }
</script>
