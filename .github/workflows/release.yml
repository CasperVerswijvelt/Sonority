name: Release

# Builds installable artifacts and publishes a GitHub Release when a version
# tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# One job per platform × destination, all running in parallel:
#   android           release-signed APK + AAB → GitHub Release + Google Play
#   ios-unsigned      unsigned .ipa (sideload / re-sign with AltStore, Sideloadly) → GitHub Release
#   ios-testflight    signed iOS build → TestFlight
#   macos-dmg         Developer ID-signed + notarized .dmg → GitHub Release
#   macos-testflight  signed macOS build → TestFlight (best-effort)
#   publish-github    gathers android + ios-unsigned + macos-dmg artifacts → GitHub Release
#
# The three artifact producers fan into publish-github; the two *-testflight jobs
# are independent, so a TestFlight failure never blocks the GitHub Release.
# Signing/publishing steps are gated on secrets, so secret-less forks stay green
# (with unsigned fallbacks). All Apple jobs run on macos-26 — App Store Connect
# rejects uploads built with an older SDK (needs Xcode 26 / iOS 26 SDK).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.2'

jobs:
  # ── Android · build + Google Play ───────────────────────────────────────────
  android:
    name: Android — build & Google Play
    runs-on: ubuntu-latest
    # Repo secrets that enable signing + Play publishing (all optional — without
    # them the job still builds a debug-signed APK and skips the Play upload):
    #   ANDROID_KEYSTORE_BASE64      base64 of upload-keystore.jks
    #   ANDROID_KEYSTORE_PASSWORD    keystore (store) password
    #   ANDROID_KEY_ALIAS            key alias
    #   ANDROID_KEY_PASSWORD         key password
    #   PLAY_SERVICE_ACCOUNT_JSON    Play service-account JSON (full contents)
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/upload-keystore.jks"

      - name: Build signed release APK + AAB
        env:
          # If the keystore wasn't decoded this path won't exist and the build
          # falls back to debug signing (see android/app/build.gradle.kts).
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Stage APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/Sonority-${{ github.ref_name }}.apk"
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish AAB → Google Play (internal testing)
        if: env.HAS_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: be.casperverswijvelt.sonority
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  # ── iOS · unsigned .ipa (sideload) ──────────────────────────────────────────
  ios-unsigned:
    name: iOS — unsigned .ipa (sideload)
    # macos-26 = Xcode 26 / iOS 26 SDK, matching the TestFlight jobs so every
    # Apple build uses one toolchain.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Build unsigned iOS .ipa
        run: |
          mkdir -p dist
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          # -y preserves the symlinks inside the .app bundle
          zip -qry "$GITHUB_WORKSPACE/dist/Sonority-${{ github.ref_name }}-ios-unsigned.ipa" Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned
          path: dist/*.ipa
          if-no-files-found: error

  # ── iOS · TestFlight ────────────────────────────────────────────────────────
  ios-testflight:
    name: iOS — TestFlight
    # Apple signing secrets (see docs/PUBLISHING-APPLE.md). Steps no-op without
    # them so forks stay green:
    #   ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_BASE64  App Store Connect API key
    #   MATCH_PASSWORD, MATCH_GIT_URL, MATCH_GIT_BASIC_AUTHORIZATION  match repo
    runs-on: macos-26
    env:
      HAS_SIGNING: ${{ secrets.MATCH_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: flutter pub get

      - name: Decode App Store Connect API key
        if: env.HAS_SIGNING == 'true'
        run: echo "${{ secrets.ASC_KEY_BASE64 }}" | base64 --decode > "${{ github.workspace }}/fastlane/AuthKey.p8"

      - name: Build & upload iOS → TestFlight
        if: env.HAS_SIGNING == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ./fastlane/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FLUTTER_BIN: flutter
        run: bundle exec fastlane ios beta

  # ── macOS · notarized .dmg (direct download) ────────────────────────────────
  macos-dmg:
    name: macOS — notarized .dmg
    runs-on: macos-26
    # Developer ID identity comes from a single p12 secret (not match — see the
    # `mac github` lane); notarization uses the ASC API key.
    env:
      HAS_DEVID: ${{ secrets.MACOS_DEVID_P12_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: flutter pub get

      - name: Decode App Store Connect API key
        if: env.HAS_DEVID == 'true'
        run: echo "${{ secrets.ASC_KEY_BASE64 }}" | base64 --decode > "${{ github.workspace }}/fastlane/AuthKey.p8"

      - name: Build, sign (Developer ID) & notarize .dmg
        if: env.HAS_DEVID == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ./fastlane/AuthKey.p8
          MACOS_DEVID_P12_BASE64: ${{ secrets.MACOS_DEVID_P12_BASE64 }}
          MACOS_DEVID_P12_PASSWORD: ${{ secrets.MACOS_DEVID_P12_PASSWORD }}
          FLUTTER_BIN: flutter
          RELEASE_TAG: ${{ github.ref_name }}
        run: bundle exec fastlane mac github

      - name: Build unsigned .dmg (fallback, no signing secrets)
        if: env.HAS_DEVID != 'true'
        run: |
          mkdir -p dist
          flutter build macos --release
          hdiutil create -volname Sonority -ov -format UDZO \
            -srcfolder build/macos/Build/Products/Release/Sonority.app \
            "dist/Sonority-${{ github.ref_name }}-macos.dmg"

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  # ── macOS · TestFlight (best-effort) ────────────────────────────────────────
  macos-testflight:
    name: macOS — TestFlight
    runs-on: macos-26
    env:
      HAS_SIGNING: ${{ secrets.MATCH_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: flutter pub get

      - name: Decode App Store Connect API key
        if: env.HAS_SIGNING == 'true'
        run: echo "${{ secrets.ASC_KEY_BASE64 }}" | base64 --decode > "${{ github.workspace }}/fastlane/AuthKey.p8"

      - name: Build & upload macOS → TestFlight
        if: env.HAS_SIGNING == 'true'
        # Best-effort: macOS TestFlight processing is finicky and this job blocks
        # nothing, so a failure here shouldn't fail the run.
        continue-on-error: true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ./fastlane/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FLUTTER_BIN: flutter
        run: bundle exec fastlane mac beta

  # ── GitHub Release · publish artifacts + notes ──────────────────────────────
  publish-github:
    name: Publish release + notes
    needs: [android, ios-unsigned, macos-dmg]
    # Publish as long as the APK built; iOS/macOS assets are attached if present.
    if: ${{ always() && needs.android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # needed so body_path (release notes) resolves
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Delete existing release for this tag (clean re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            | grep -m1 '"id":' | sed 's/[^0-9]//g')
          if [ -n "$id" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$id"
            echo "Deleted existing release $id"
          else
            echo "No existing release to delete"
          fi
      - name: Compose release notes (changelog section + install notes)
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the "## [<version>] ..." section from CHANGELOG.md, stopping
          # at the next "## [" heading.
          section=$(awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; print; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md)
          {
            if [ -n "$section" ]; then
              printf '%s\n\n---\n\n' "$section"
            else
              echo "::warning::No CHANGELOG.md section for $version"
            fi
            cat .github/release-install-notes.md
          } > release-body.md
          echo "----- release-body.md -----"
          cat release-body.md
      - name: Publish release (APK + .ipa + .dmg)
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          # NOTE: do not enable generate_release_notes — it overrides body_path.
          # body = the matching CHANGELOG.md section + the install instructions.
          body_path: release-body.md
          fail_on_unmatched_files: false
