name: Release

# Builds installable artifacts and publishes a GitHub Release when a version
# tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Artifacts:
#   - Android  : release APK (debug-signed, installable)
#   - iOS      : unsigned .ipa (sideload / re-sign with AltStore, Sideloadly, …)
#   - macOS    : unsigned .app .zip (best-effort; skipped if CI signing blocks it)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.2'

jobs:
  android:
    runs-on: ubuntu-latest
    # Repo secrets that enable signing + Play publishing (all optional — without
    # them the job still builds a debug-signed APK and skips the Play upload):
    #   ANDROID_KEYSTORE_BASE64      base64 of upload-keystore.jks
    #   ANDROID_KEYSTORE_PASSWORD    keystore (store) password
    #   ANDROID_KEY_ALIAS            key alias
    #   ANDROID_KEY_PASSWORD         key password
    #   PLAY_SERVICE_ACCOUNT_JSON    Play service-account JSON (full contents)
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
      HAS_PLAY_SA: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get

      - name: Decode upload keystore
        if: env.HAS_KEYSTORE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "${{ github.workspace }}/upload-keystore.jks"

      - name: Build release APK + AAB
        env:
          # If the keystore wasn't decoded this path won't exist and the build
          # falls back to debug signing (see android/app/build.gradle.kts).
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Stage APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             "dist/Sonority-${{ github.ref_name }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish to Google Play (internal testing)
        if: env.HAS_PLAY_SA == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: be.casperverswijvelt.sonority
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

  apple:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: mkdir -p dist

      - name: Build iOS (unsigned)
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          # -y preserves the symlinks inside the .app bundle
          zip -qry "$GITHUB_WORKSPACE/dist/Sonority-${{ github.ref_name }}-ios-unsigned.ipa" Payload

      - name: Build macOS (unsigned, best-effort)
        continue-on-error: true
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          zip -qry "$GITHUB_WORKSPACE/dist/Sonority-${{ github.ref_name }}-macos.zip" Sonority.app

      - uses: actions/upload-artifact@v4
        with:
          name: apple
          path: dist/*
          if-no-files-found: error

  app-store:
    # Tag builds → TestFlight (iOS + macOS) via fastlane match. Entirely gated on
    # signing secrets; the steps no-op if they're unset, so forks/secret-less
    # repos still get a green run. Set in repo Settings → Secrets → Actions:
    #   ASC_KEY_ID, ASC_ISSUER_ID    App Store Connect API key id + issuer (Admin role)
    #   ASC_KEY_BASE64               base64 of the AuthKey_XXXX.p8
    #   MATCH_PASSWORD               match repo encryption passphrase
    #   MATCH_GIT_URL                https URL of the private certs repo
    #   MATCH_GIT_BASIC_AUTHORIZATION  base64 of "user:PAT" with read access to it
    # macos-26 ships Xcode 26 / the iOS 26 SDK. App Store Connect now REJECTS
    # uploads built with an older SDK (macos-14's Xcode → iOS 17.5 SDK) with a
    # 409 "SDK version issue". The sideload `apple` job stays on macos-14 — its
    # unsigned artifacts don't go through App Store SDK validation.
    runs-on: macos-26
    env:
      HAS_SIGNING: ${{ secrets.MATCH_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - run: flutter pub get

      - name: Decode App Store Connect API key
        if: env.HAS_SIGNING == 'true'
        run: echo "${{ secrets.ASC_KEY_BASE64 }}" | base64 --decode > "${{ github.workspace }}/fastlane/AuthKey.p8"

      - name: iOS → TestFlight
        if: env.HAS_SIGNING == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ./fastlane/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FLUTTER_BIN: flutter
        run: bundle exec fastlane ios beta

      - name: macOS → TestFlight (best-effort)
        if: env.HAS_SIGNING == 'true'
        continue-on-error: true
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_FILEPATH: ./fastlane/AuthKey.p8
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          FLUTTER_BIN: flutter
        run: bundle exec fastlane mac beta

  release:
    needs: [android, apple]
    # Publish as long as the APK built; iOS/macOS are included if present.
    if: ${{ always() && needs.android.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # needed so body_path (release notes) resolves
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Delete existing release for this tag (clean re-runs)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          id=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}" \
            | grep -m1 '"id":' | sed 's/[^0-9]//g')
          if [ -n "$id" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$id"
            echo "Deleted existing release $id"
          else
            echo "No existing release to delete"
          fi
      - name: Compose release notes (changelog section + install notes)
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract the "## [<version>] ..." section from CHANGELOG.md, stopping
          # at the next "## [" heading.
          section=$(awk -v ver="$version" '
            $0 ~ ("^## \\[" ver "\\]") {flag=1; print; next}
            /^## \[/ && flag {exit}
            flag {print}
          ' CHANGELOG.md)
          {
            if [ -n "$section" ]; then
              printf '%s\n\n---\n\n' "$section"
            else
              echo "::warning::No CHANGELOG.md section for $version"
            fi
            cat .github/release-install-notes.md
          } > release-body.md
          echo "----- release-body.md -----"
          cat release-body.md
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          # NOTE: do not enable generate_release_notes — it overrides body_path.
          # body = the matching CHANGELOG.md section + the install instructions.
          body_path: release-body.md
          fail_on_unmatched_files: false
