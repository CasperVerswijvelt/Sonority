<title>Sonority asset export</title>
<style>html,body{margin:0;padding:0;background:#0A0A0B}#stage{}svg{display:block}</style>
<div id="stage"></div>
<script>
const BG='#0A0A0B', INK='#FFFFFF', GREY='#98989F';
const FONT="'Futura','Avenir Next','Century Gothic',ui-rounded,system-ui,sans-serif";

const circle=(cx,cy,r,f)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${f}"/>`;
const rrect=(x,y,w,h,r,f)=>`<rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="${r}" fill="${f}"/>`;

// The mark (9c-3): three speaker cabinets — tweeter (upper) + woofer (lower) each,
// a white front speaker flanked by two grey ones whose tops peek a little higher.
// bbox ≈ x 214–786 (cx 500), y 250–640 (cy 445). No soundbar, no sub.
function spk(cx,cy,h,fill){
  const w=h*0.74, r=h*0.16;
  return rrect(cx,cy,w,h,r,fill)
    + circle(cx, cy-h*0.235, h*0.085, BG)   // tweeter
    + circle(cx, cy+h*0.16,  h*0.185, BG);  // woofer
}
function mark(){
  return spk(325,400,300,GREY) + spk(675,400,300,GREY) + spk(500,460,360,INK);
}

// App ICON — mark only, large, on EVERY platform (iOS, macOS, Android legacy,
// splash, README/Play 512). Apple HIG discourages app-name text in icons and the
// Android mask would clip a wordmark; the OS prints the name under the icon. The
// SONORITY wordmark lives in the logo lockup (splash branding + marketing +
// design/logo.html), not here. Centred, scaled 1.15 about (500,500).
function iconSvg() {
  return `<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="1000" fill="${BG}"/>
    <g transform="translate(500 500) scale(1.15) translate(-500 -445)">${mark()}</g></svg>`;
}
// Android adaptive FOREGROUND. The generator wraps this image in a 16% inset and
// the launcher then masks to ≈ the inscribed circle, so keep the mark modest
// (scale 1.0 about its own centre) — it NEVER clips the outer speakers. Opaque
// black bg blends with the adaptive background layer (also #0A0A0B).
function iconFgSvg() {
  return `<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="1000" fill="${BG}"/>
    <g transform="translate(500 500) scale(1.0) translate(-500 -445)">${mark()}</g></svg>`;
}
// Splash branding wordmark (SONORITY only). Unchanged.
function wordmarkSvg() {
  return `<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="1000" height="260" fill="${BG}"/>
    <text x="500" y="192" text-anchor="middle" font-family="${FONT}" font-size="150"
      font-weight="500" letter-spacing="0.005em" fill="${INK}">SONORITY</text></svg>`;
}

const mode = new URLSearchParams(location.search).get('mode') || 'icon';
const stage = document.getElementById('stage');
if (mode === 'wordmark') {
  stage.style.cssText = 'width:1000px;height:260px';
  stage.innerHTML = wordmarkSvg();
  stage.firstElementChild.style.cssText = 'width:1000px;height:260px';
} else {
  stage.style.cssText = 'width:1024px;height:1024px';
  stage.innerHTML = (mode === 'iconfg') ? iconFgSvg() : iconSvg();
  stage.firstElementChild.style.cssText = 'width:1024px;height:1024px';
}
</script>
